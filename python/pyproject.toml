[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "relativedb"
version = "0.1.0"
description = "Predictive queries (PQL) over your own data: GraphQL-style user-defined retrievers, no bundled database connectors."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "relativedb contributors" }]
dependencies = [
    "numpy>=1.24",
]

[project.optional-dependencies]
pandas = ["pandas>=2.0"]
rt = ["sentence-transformers>=3.0", "huggingface_hub>=0.23"]
dev = ["pytest>=7", "pandas>=2.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
