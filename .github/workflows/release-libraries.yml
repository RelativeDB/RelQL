name: Release libraries

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the verified artifacts to their registries
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-libraries
  cancel-in-progress: false

jobs:
  python:
    name: Build Python distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install build and test dependencies
        run: python -m pip install --upgrade build twine "./python[dev]"
      - name: Test
        run: python -m pytest python/tests
      - name: Build and inspect distributions
        run: |
          python -m build python
          python -m twine check python/dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: python-distributions
          path: python/dist/
          if-no-files-found: error

  rust:
    name: Build Rust crate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: Test
        run: cargo test --manifest-path rust/Cargo.toml
      - name: Package and verify crate
        run: cargo package --manifest-path rust/relativedb/Cargo.toml
      - uses: actions/upload-artifact@v7
        with:
          name: rust-crate
          path: rust/target/package/relationdb-*.crate
          if-no-files-found: error

  java:
    name: Build Java publications
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Test and stage Maven publications locally
        working-directory: java
        run: ./gradlew --no-daemon test publishToMavenLocal
      - uses: actions/upload-artifact@v7
        with:
          name: java-publications
          path: |
            ~/.m2/repository/com/relativedb/relationdb/
            ~/.m2/repository/com/relativedb/relationdb-rt/
          if-no-files-found: error

  publish-python:
    name: Publish Python to PyPI
    if: ${{ inputs.publish }}
    needs: [python, rust, java]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/relationdb
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-rust:
    name: Publish Rust to crates.io
    if: ${{ inputs.publish }}
    needs: [python, rust, java]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        run: cargo publish --manifest-path rust/relativedb/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-java:
    name: Publish Java to Maven Central
    if: ${{ inputs.publish }}
    needs: [python, rust, java]
    runs-on: ubuntu-latest
    environment: maven-central
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Publish and release Maven Central deployment
        working-directory: java
        run: >-
          ./gradlew --no-daemon
          -PmavenCentralPublishing=true
          -PmavenCentralAutomaticPublishing=true
          -PsignAllPublications=true
          publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.MAVEN_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.MAVEN_SIGNING_PASSWORD }}
