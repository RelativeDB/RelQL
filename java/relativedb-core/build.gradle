plugins {
    id 'java-library'
    id 'com.vanniktech.maven.publish'
}

dependencies {
    // JNA binds the shared C++ runtime (librt_c), which is the single source of
    // truth for the RelQL parser (and the CSC index). librt_c is a hard runtime
    // dependency — there is no in-process fallback parser.
    implementation 'net.java.dev.jna:jna:5.14.0'
}

mavenPublishing {
    coordinates('com.relativedb', 'relationdb', project.version.toString())

    pom {
        name = 'relationdb'
        description = 'Predictive queries (RelQL) over relational data.'
        inceptionYear = '2026'
        url = 'https://github.com/RelativeDB/RelQL'
        licenses {
            license {
                name = 'The Apache License, Version 2.0'
                url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                distribution = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
            }
        }
        developers {
            developer {
                id = 'henneberger'
                name = 'henneberger'
                url = 'https://github.com/henneberger'
            }
        }
        scm {
            url = 'https://github.com/RelativeDB/RelQL'
            connection = 'scm:git:git://github.com/RelativeDB/RelQL.git'
            developerConnection = 'scm:git:ssh://git@github.com/RelativeDB/RelQL.git'
        }
    }
}
